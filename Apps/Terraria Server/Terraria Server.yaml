name: terraria-docker
services:
  terraria-docker:
    cpu_shares: 90
    command: []
    container_name: terraria-docker
    deploy:
      resources:
        limits:
          memory: 33582936064
        reservations:
          devices: []
    environment:
      - AUTOCREATE=
      - DIFFICULTY	=
      - MAXPLAYERS=8
      - MODPACK=WillModPack
      - MOTD=Zen's Terraria Server
      - PASSWORD=Zen
      - PGID=1000
      - PUID=1000
      - SEED=
      - SERVERCONFIG=0
      - WORLDNAME=Docker
    image: passivelemon/terraria-docker:tmodloader-latest
    labels:
      icon: https://icon.casaos.io/main/all/terraria-docker.png
    ports:
      - target: 7777
        published: "7777"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /media/Hitachi5600/TerrariaServer
        target: /opt/terraria/config
    devices: []
    cap_add: []
    network_mode: bridge
    privileged: false
x-casaos:
  author: self
  category: self
  hostname: ""
  icon: https://icon.casaos.io/main/all/terraria-docker.png
  index: /
  is_uncontrolled: false
  port_map: "7777"
  scheme: http
  store_app_id: terraria-docker
  title:
    custom: Terraria Server
    en_us: terraria-docker
