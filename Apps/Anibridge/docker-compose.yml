name: anibridge
services:
  anibridge:
    cpu_shares: 90
    command: []
    deploy:
      resources:
        limits:
          memory: 33582940160
        reservations:
          devices: []
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=America/Denver
      - UMASK=22
    image: ghcr.io/anibridge/anibridge:latest
    labels:
      icon: https://raw.githubusercontent.com/Izanagi11/IzaServerAppstore/refs/heads/main/Apps/Anibridge/229410720.png
    ports:
      - target: 4848
        published: "4848"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /media/ZimaOS-HD/AppData/AniBridge
        target: /config
    devices: []
    cap_add: []
    network_mode: bridge
    privileged: false
    container_name: ""
x-casaos:
  author: self
  category: self
  hostname: ""
  icon: https://raw.githubusercontent.com/Izanagi11/IzaServerAppstore/refs/heads/main/Apps/Anibridge/229410720.png
  index: /
  is_uncontrolled: false
  port_map: "4848"
  scheme: http
  store_app_id: anibridge
  title:
    custom: ""
    en_us: anibridge
