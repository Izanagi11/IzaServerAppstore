name: neutarr
services:
  neutarr:
    cpu_shares: 90
    command: []
    container_name: neutarr
    deploy:
      resources:
        limits:
          memory: 33582940160
        reservations:
          devices: []
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=America/Denver
    image: iampuid0/neutarr:latest
    labels:
      icon: https://imgs.search.brave.com/JNLm-j0M8nk1eIOclc6DYCFak1Qe2bS63LmS39sAax4/rs:fit:860:0:0:0/g:
    ports:
      - target: 9705
        published: "9705"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/neutarr
        target: /config
    devices: []
    cap_add: []
    network_mode: bridge
    privileged: false
x-casaos:
  author: self
  category: self
  hostname: ""
  icon: https://imgs.search.brave.com/JNLm-j0M8nk1eIOclc6DYCFak1Qe2bS63LmS39sAax4/rs:fit:860:0:0:0/g:
  index: /
  is_uncontrolled: false
  port_map: "9705"
  scheme: http
  store_app_id: neutarr
  title:
    custom: neutarr
    en_us: neutarr
