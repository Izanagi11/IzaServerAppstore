name: qbittorrent-gluetun
services:
  qbittorrent:
    image: ghcr.io/hotio/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=America/Denver
      - UMASK=002
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/config
        target: /config
      - type: bind
        source: /DATA/AppData/$AppID/downloads
        target: /media/Downloads
    network_mode: container:gluetun
    x-casaos:
      envs:
        - container: TZ
          description:
            en_US: Timezone configuration
      volumes:
        - container: /config
          description:
            en_US: qBittorrent configuration files
        - container: /media/Downloads
          description:
            en_US: Primary download directory

x-casaos:
  architectures:
    - amd64
    - arm64
  main: qbittorrent
  author: Izanagi11
  category: Downloader
  title:
    en_US: qBittorrent (Gluetun)
  tagline:
    en_US: P2P BitTorrent client routed through VPN
  description:
    en_US: "The hotio qBittorrent client, heavily optimized for home media servers.\n\n⚠️ IMPORTANT VPN DEPENDENCY: This app is hardcoded with 'network_mode: container:gluetun'. It WILL crash on startup if you do not already have a container named exactly 'gluetun' running on your system. Additionally, because the network is shared, you must expose WebUI port 8080 on the Gluetun container, not here."
  icon: https://raw.githubusercontent.com/Izanagi11/IzaServerAppstore/refs/heads/main/Apps/qBittorrent-Gluetun/icon.png
  port_map: "8080"
  index: /