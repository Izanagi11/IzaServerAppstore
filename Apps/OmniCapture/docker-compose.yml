name: OmniCapture
services:
  omnicapture:
    image: ghcr.io/izanagi11/omnicapture-server:latest
    container_name: omnicapture
    ports:
      - "8181:8000"
    volumes:
      - /media/ZimaOS-HD/AppData/omnicapture/server/data:/app/server/data
      - /media/WD7200_2/stash/_Unsorted_Junk:/app/server/data/downloads
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
  main_app: omnicapture
  title:
    custom: OmniCapture
  description:
    en_us: Headless 24/7 Auto-DVR Engine
  category: Media
  port_map: "8181"
  author: Iza
  # Add any direct image link here so it looks good in the store!
  icon: https://raw.githubusercontent.com/Izanagi11/IzaServerAppstore/refs/heads/main/Apps/OmniCapture/video-camera.png
