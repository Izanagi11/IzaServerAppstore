name: profilarr
services:
  parser:
    cpu_shares: 90
    command: []
    container_name: profilarr-parser
    deploy:
      resources:
        limits:
          memory: 50443632640
        reservations:
          devices: []
    expose:
      - "5000"
    image: ghcr.io/dictionarry-hub/profilarr-parser:latest
    labels:
      icon: https://raw.githubusercontent.com/Izanagi11/IzaServerAppstore/refs/heads/main/Apps/Profilarr/repeat-icons.png
    restart: unless-stopped
    ports: []
    volumes: []
    devices: []
    cap_add: []
    environment: []
    network_mode: bridge
    privileged: false
  profilarr:
    cpu_shares: 90
    command: []
    container_name: profilarr
    depends_on:
      parser:
        condition: service_healthy
        required: true
    deploy:
      resources:
        limits:
          memory: 50443632640
        reservations:
          devices:
            - count: all
              capabilities:
                - gpu
    environment:
      - PARSER_HOST=parser
      - PARSER_PORT=5000
      - PGID=1000
      - PUID=1000
      - TZ=America/Denver
    image: ghcr.io/dictionarry-hub/profilarr:latest
    labels:
      icon: https://raw.githubusercontent.com/Izanagi11/IzaServerAppstore/refs/heads/main/Apps/Profilarr/repeat-icons.png
    ports:
      - target: 6868
        published: "6868"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /media/ZimaOS-HD/AppData/profilarr
        target: /config
    devices: []
    cap_add: []
    network_mode: bridge
    privileged: false
x-casaos:
  author: self
  category: self
  hostname: ""
  icon: https://icon.casaos.io/main/all/profilarr.png
  index: /
  is_uncontrolled: false
  port_map: "6868"
  scheme: http
  store_app_id: profilarr
  title:
    custom: ""
    en_us: profilarr
