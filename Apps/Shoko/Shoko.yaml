name: shoko_server
services:
  shoko_server:
    cpu_shares: 90
    command: []
    container_name: shoko_server
    deploy:
      resources:
        limits:
          memory: 33582936064
        reservations:
          devices:
            - count: all
              capabilities:
                - gpu
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=Ameria/Denver
    image: ghcr.io/shokoanime/server:v5.3.3
    labels:
      icon: https://docs.shokoanime.com/images/logo.svg
    ports:
      - target: 8111
        published: "8111"
        protocol: tcp
    restart: always
    shm_size: "268435456"
    volumes:
      - type: bind
        source: /media/ZimaOS-HD/AppData/shoko
        target: /home/shoko/.shoko
      - type: bind
        source: /media/Media
        target: /mnt/Media
    devices: []
    cap_add: []
    network_mode: bridge
    privileged: false
x-casaos:
  author: self
  category: self
  hostname: ""
  icon: https://docs.shokoanime.com/images/logo.svg
  index: /
  is_uncontrolled: false
  port_map: "8111"
  scheme: http
  store_app_id: shoko_server
  title:
    custom: Shoko
    en_us: shoko_server
