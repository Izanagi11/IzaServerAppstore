name: shoko-server
services:
  shoko_server:
    image: ghcr.io/shokoanime/server:v5.3.3
    container_name: shoko_server
    restart: unless-stopped
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=America/Denver
    ports:
      - target: 8111
        published: "8111"
        protocol: tcp
    shm_size: 256m
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/config
        target: /home/shoko/.shoko
      - type: bind
        source: /DATA/AppData/$AppID/media
        target: /mnt/Media
    x-casaos:
      envs:
        - container: TZ
          description:
            en_US: Timezone configuration
      ports:
        - container: "8111"
          description:
            en_US: WebUI Port
      volumes:
        - container: /home/shoko/.shoko
          description:
            en_US: Shoko Server configuration and database
        - container: /mnt/Media
          description:
            en_US: Anime media directory

x-casaos:
  architectures:
    - amd64
    - arm64
  main: shoko_server
  author: Izanagi11
  category: Media
  title:
    en_US: Shoko Server
  tagline:
    en_US: Anime management system
  description:
    en_US: Shoko is a complete anime management system. It keeps track of your anime collection, synchronizes your watch state with AniDB, and provides metadata for your media players.
  icon: https://raw.githubusercontent.com/Izanagi11/IzaServerAppstore/refs/heads/main/Apps/Shoko/logo.svg
  port_map: "8111"
  index: /